name: Deploy UI Worker

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ui-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy frontend
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: ${{ github.event_name == 'workflow_dispatch' || vars.GITTENSORY_UI_DEPLOY == 'true' }}
    environment:
      name: cloudflare-ui
      url: https://gittensory.aethereal.dev/
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate frontend
        env:
          VITE_GITTENSORY_API_ORIGIN: https://gittensory-api.aethereal.dev
        run: npm run ui:openapi:check && npm run ui:lint && npm run ui:typecheck && npm run ui:build

      - name: Deploy frontend Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npm run ui:deploy:built
