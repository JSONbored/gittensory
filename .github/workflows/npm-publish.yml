name: Publish MCP Package

# workflow_dispatch-only (no push:tags: trigger): a GITHUB_TOKEN-created tag (e.g. from the release
# automation) does not fire push-triggered workflows, so the release automation must explicitly
# dispatch this workflow after it tags a release. A bare manual dispatch (released_by_release_please
# left false) is the human override path and self-tags HEAD from packages/gittensory-mcp/package.json's
# version, matching the old "push a tag to publish" flow just invoked differently.
on:
  workflow_dispatch:
    inputs:
      released_by_release_please:
        description: "Internal: set by the release automation's dispatch so this run skips re-creating the GitHub release it already made."
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: npm-publish-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    timeout-minutes: 20
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24.18.0
          registry-url: https://registry.npmjs.org

      # workflow_dispatch has no tag ref to derive a version from (unlike the old push:tags: trigger),
      # so the dispatched commit's package.json is now the single source of truth for VERSION/TAG. If
      # the tag already exists (release automation tagged it before dispatching this workflow), just
      # verify it points at HEAD rather than re-creating it; a bare manual dispatch with no pre-existing
      # tag self-tags HEAD.
      - name: Resolve and verify release version
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          VERSION="$(node -p "require('./packages/gittensory-mcp/package.json').version")"
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid package version: $VERSION"
            exit 1
          fi
          TAG="mcp-v${VERSION}"
          HEAD_SHA="$(git rev-parse HEAD)"
          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            TAG_SHA="$(git rev-list -n 1 "$TAG")"
            if [ "$TAG_SHA" != "$HEAD_SHA" ]; then
              echo "::error::Tag $TAG already exists but points at $TAG_SHA, not the dispatched commit $HEAD_SHA"
              exit 1
            fi
            echo "Tag $TAG already exists and matches HEAD."
          else
            echo "Tag $TAG does not exist yet; creating it at HEAD ($HEAD_SHA)."
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "$TAG" -m "@jsonbored/gittensory-mcp v${VERSION}"
            git remote set-url origin "https://github.com/${GITHUB_REPOSITORY}.git"
            gh auth setup-git
            git push origin "$TAG"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: npm ci

      # packages/gittensory-mcp's own test suite pulls in src/mcp/find-opportunities.ts transitively
      # (via packages/gittensory-miner/lib/opportunity-fanout.js), which imports @jsonbored/gittensory-engine.
      # That package's dist/ is gitignored (see ci.yml's own build --workspace @jsonbored/gittensory-engine
      # step for the same reason) -- without building it first, the MCP release validation gate below
      # fails with "Failed to resolve entry for package @jsonbored/gittensory-engine" on every run.
      - name: Build gittensory-engine
        run: npm run build --workspace @jsonbored/gittensory-engine

      - name: MCP release validation gate
        run: npm run test:release:mcp

      - name: Packed tarball smoke test
        run: |
          set -euo pipefail
          PACK_JSON="$(npm pack --workspace @jsonbored/gittensory-mcp --json)"
          TARBALL="$(node -e 'const fs=require("fs"); const input=fs.readFileSync(0,"utf8"); process.stdout.write(JSON.parse(input)[0].filename)' <<< "$PACK_JSON")"
          UNEXPECTED_FILES="$(tar -tzf "$TARBALL" | grep -Ev '^(package/(bin|lib|scripts)/.+|package/(package.json|README.md|CHANGELOG.md|LICENSE))$' || true)"
          if [ -n "$UNEXPECTED_FILES" ]; then
            printf '%s\n' "$UNEXPECTED_FILES"
            echo "Unexpected file in package tarball"
            exit 1
          fi
          if tar -xOf "$TARBALL" | grep -E '(BEGIN (RSA |EC |OPENSSH )?PRIVATE KEY|github_pat_|gh[pousr]_|gts_[0-9a-f]{64}|[A-Z0-9_]*(TOKEN|SECRET|PRIVATE_KEY)=)'; then
            echo "Secret-like content found in package tarball"
            exit 1
          fi
          TMP="$(mktemp -d)"
          npm --prefix "$TMP" init -y >/dev/null
          npm --prefix "$TMP" install "$PWD/$TARBALL" >/dev/null
          "$TMP/node_modules/.bin/gittensory-mcp" --help >/dev/null

      - name: Publish with npm trusted publishing
        run: npx -y npm@11.15.0 publish --workspace @jsonbored/gittensory-mcp --access public --provenance

  github-release:
    runs-on: ubuntu-latest
    needs: publish
    # Skip when the release automation dispatched this run: it already created the GitHub release
    # with its own generated changelog notes before dispatching, so running this unconditionally
    # would overwrite those richer notes with the generic blurb below.
    if: ${{ inputs.released_by_release_please != true }}
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.publish.outputs.tag }}
          RELEASE_VERSION: ${{ needs.publish.outputs.version }}
        run: |
          set -euo pipefail
          NOTES_FILE="$(mktemp)"
          cat > "$NOTES_FILE" <<EOF
          Published [@jsonbored/gittensory-mcp v${RELEASE_VERSION}](https://www.npmjs.com/package/@jsonbored/gittensory-mcp/v/${RELEASE_VERSION}) to npm with provenance.

          Install:

          \`\`\`sh
          npm install -g @jsonbored/gittensory-mcp@${RELEASE_VERSION}
          \`\`\`
          EOF
          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --title "@jsonbored/gittensory-mcp v${RELEASE_VERSION}" --notes-file "$NOTES_FILE"
          else
            gh release create "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --title "@jsonbored/gittensory-mcp v${RELEASE_VERSION}" --notes-file "$NOTES_FILE" --verify-tag
          fi
