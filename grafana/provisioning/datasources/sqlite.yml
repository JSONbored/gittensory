# Maintainer-only SQLite datasource for local operator dashboards. The compose stack mounts the app
# database at /appdb for Grafana, and these dashboards run aggregate SELECTs over internal tables.
apiVersion: 1
datasources:
  - name: GittensoryDB
    type: frser-sqlite-datasource
    uid: gittensory-db
    access: proxy
    editable: false
    jsonData:
      path: /appdb/gittensory.sqlite
